<div class="auth-container">
  <div class="auth-box">
    <h1 class="logo display-font">Busca <span class="text-accent">Promoção</span></h1>
    <p class="subtitle">Faça login para acessar seu radar de promoções.</p>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="auth-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" name="email" [(ngModel)]="dados.email" required placeholder="seu&#64;email.com">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" name="senha" [(ngModel)]="dados.senha" required placeholder="••••••••">
      </div>

      <div class="error-msg" *ngIf="erro()">{{ erro() }}</div>

      <button type="submit" class="btn-primary w-100" [disabled]="!loginForm.form.valid || loading()">
        {{ loading() ? 'Entrando...' : 'ENTRAR' }} 
      </button>
    </form>

    <div class="auth-footer">
      Não tem conta? <a routerLink="/registrar">Crie uma agora</a>
    </div>
  </div>
</div>
