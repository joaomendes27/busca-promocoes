version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: buscapromocao_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: buscapromocao_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: buscapromocao_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"   # port for AMQP
      - "15672:15672" # port for Management UI
    restart: unless-stopped

  nitter:
    image: zedeus/nitter:latest
    container_name: buscapromocao_nitter
    ports:
      - "8080:8080"
    volumes:
      - ./nitter.conf:/src/nitter.conf:ro
      - ./sessions.jsonl:/src/sessions.jsonl:ro
    restart: unless-stopped

  # --- BACKEND SERVICES ---
  api:
    build: 
      context: ./busca-promocao-back
      dockerfile: BuscaPromocao.Api/Dockerfile
    container_name: buscapromocao_api
    ports:
      - "5247:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Include Error Detail=true
      - Nitter__BaseUrl=http://nitter:8080
    depends_on:
      - postgres
      - redis
      - rabbitmq
      - nitter
    restart: unless-stopped

  crawler:
    build:
      context: ./busca-promocao-back
      dockerfile: BuscaPromocao.Crawler/Dockerfile
    container_name: buscapromocao_crawler
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - MessageBroker__Host=rabbitmq
      - MessageBroker__Username=${RABBITMQ_USER}
      - MessageBroker__Password=${RABBITMQ_PASSWORD}
      - Redis__ConnectionString=redis:6379
      - Nitter__BaseUrl=http://nitter:8080
      - Crawler__IntervaloMinutos=1
    depends_on:
      - postgres
      - rabbitmq
      - redis
      - nitter
      - api
    restart: unless-stopped

  notifier:
    build:
      context: ./busca-promocao-back
      dockerfile: BuscaPromocao.Notifier/Dockerfile
    container_name: buscapromocao_notifier
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - MessageBroker__Host=rabbitmq
      - MessageBroker__Username=${RABBITMQ_USER}
      - MessageBroker__Password=${RABBITMQ_PASSWORD}
      - Email__SmtpHost=${EMAIL_SMTP_HOST:-smtp.gmail.com}
      - Email__SmtpPort=${EMAIL_SMTP_PORT:-587}
      - Email__RemetenteEmail=${EMAIL_USER:-}
      - Email__RemetenteSenha=${EMAIL_PASS:-}
    depends_on:
      - postgres
      - rabbitmq
      - api
    restart: unless-stopped

  # --- FRONTEND SERVICE ---
  frontend:
    build:
      context: ./busca-promocao-front
      dockerfile: Dockerfile
    container_name: buscapromocao_frontend
    ports:
      - "4200:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
